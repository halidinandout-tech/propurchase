<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProPurchase — Fleet Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0a0a0f;  --surface:  #111118;  --surface2: #16161f;
      --border:   #1e1e2a;  --border2:  #2a2a38;
      --accent:   #6366f1;  --accent2:  #818cf8;
      --text:     #e2e8f0;  --text2:    #94a3b8;  --text3: #475569;
      --success:  #10b981;  --warning:  #f59e0b;
      --danger:   #f43f5e;  --purple:   #a78bfa;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px; color: var(--text); background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    body { min-height: 100vh; }

    /* Login */
    .login-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .login-form { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem; width:100%; max-width:360px; }
    .login-form h2 { font-size:1rem; font-weight:600; margin-bottom:1.25rem; }

    /* Shell */
    .shell { display:flex; min-height:100vh; }
    .sidebar { width:240px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
    .logo { padding:1.5rem 1.25rem 1rem; border-bottom:1px solid var(--border); }
    .logo-name { font-size:.95rem; font-weight:700; letter-spacing:-.01em; }
    .logo-sub  { font-size:.7rem; color:var(--text3); margin-top:2px; }
    .nav-list  { list-style:none; padding:.5rem .75rem; flex:1; }
    .nav-list li { margin-bottom:2px; }
    .nav-link  { display:block; padding:.55rem .75rem; border-radius:7px; color:var(--text2); font-size:.875rem; text-decoration:none; border-left:2px solid transparent; transition:all .15s; }
    .nav-link:hover  { color:var(--text); background:var(--surface2); }
    .nav-link.active { color:var(--text); background:var(--surface2); border-left-color:var(--accent); font-weight:500; }
    .sidebar-footer { padding:1rem 1.25rem; border-top:1px solid var(--border); }
    .user-email { font-size:.75rem; color:var(--text3); margin-bottom:.6rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .main { flex:1; padding:2rem 2.5rem; overflow-y:auto; overflow-x:hidden; }

    /* Type */
    h1 { font-size:1.5rem; font-weight:600; letter-spacing:-.02em; }
    h2 { font-size:1.05rem; font-weight:600; }
    h3 { font-size:.75rem; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.08em; }
    .subtitle { color:var(--text3); font-size:.875rem; margin-top:4px; }
    .page-header { margin-bottom:2rem; }

    /* Buttons */
    .btn-primary { display:inline-block; padding:.6rem 1rem; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:.875rem; font-weight:500; cursor:pointer; font-family:inherit; transition:opacity .15s; }
    .btn-primary:hover { opacity:.88; }
    .btn-primary:disabled { background:var(--surface2); color:var(--text3); cursor:not-allowed; opacity:1; }
    .btn-ghost  { display:inline-block; padding:.6rem 1rem; background:transparent; color:var(--text2); border:1px solid var(--border2); border-radius:8px; font-size:.875rem; font-weight:500; cursor:pointer; font-family:inherit; transition:all .15s; }
    .btn-ghost:hover { color:var(--text); }
    .btn-signout { width:100%; padding:.4rem .75rem; background:transparent; border:1px solid var(--border2); color:var(--text2); border-radius:6px; font-size:.75rem; cursor:pointer; font-family:inherit; transition:all .15s; }
    .btn-signout:hover { color:var(--text); }
    .btn-back { background:none; border:none; color:var(--text3); font-size:.875rem; cursor:pointer; font-family:inherit; margin-bottom:1.5rem; padding:0; }
    .btn-back:hover { color:var(--text2); }
    .btn-remove { margin-top:14px; font-size:.75rem; color:var(--text3); background:none; border:none; cursor:pointer; font-family:inherit; padding:0; transition:color .15s; }
    .btn-remove:hover { color:var(--danger); }
    .btn-action { flex:1; padding:.65rem; border-radius:8px; font-size:.875rem; font-weight:500; cursor:pointer; font-family:inherit; text-transform:capitalize; border:1px solid; transition:opacity .15s; }
    .btn-action:hover { opacity:.85; }
    .btn-action:disabled { opacity:.5; cursor:not-allowed; }
    .btn-danger { padding:.45rem .85rem; background:rgba(244,63,94,.12); color:var(--danger); border:1px solid rgba(244,63,94,.25); border-radius:7px; font-size:.8rem; font-weight:500; cursor:pointer; font-family:inherit; transition:all .15s; }
    .btn-danger:hover { background:rgba(244,63,94,.2); }

    /* Forms */
    .field { display:flex; flex-direction:column; gap:5px; }
    .field-label { font-size:.8rem; color:var(--text2); }
    input, select, textarea { padding:.6rem .75rem; background:var(--surface2); border:1px solid var(--border2); border-radius:8px; color:var(--text); font-size:.875rem; font-family:inherit; outline:none; transition:border-color .15s; width:100%; }
    input:focus, select:focus, textarea:focus { border-color:var(--accent); }
    select option { background:var(--surface2); }
    textarea { resize:vertical; line-height:1.6; }
    .form-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.75rem; display:flex; flex-direction:column; gap:1.1rem; }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; }
    .form-grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:1rem; }
    .form-actions { display:flex; gap:.75rem; padding-top:.5rem; }
    .form-actions .btn-primary { flex:2; } .form-actions .btn-ghost { flex:1; }
    .form-section { border-top:1px solid var(--border); padding-top:1.25rem; margin-top:.25rem; }
    .form-section-title { font-size:.7rem; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:.75rem; }

    /* Alerts */
    .error-box { background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.3); color:var(--danger); border-radius:7px; padding:.6rem .75rem; font-size:.8rem; }
    .hidden { display:none !important; }

    /* Stats */
    .stat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:1rem; margin-bottom:2.5rem; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem 1.5rem; border-top:2px solid var(--border); }
    .stat-card.c-warning { border-top-color:var(--warning); } .stat-card.c-success { border-top-color:var(--success); }
    .stat-card.c-purple  { border-top-color:var(--purple);  } .stat-card.c-accent  { border-top-color:var(--accent);  }
    .stat-label { font-size:.7rem; color:var(--text3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
    .stat-value { font-size:2rem; font-weight:700; line-height:1; }

    /* List */
    .list-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .list-row  { display:flex; justify-content:space-between; align-items:center; padding:.875rem 1.25rem; border-bottom:1px solid var(--border); color:inherit; transition:background .15s; cursor:pointer; }
    .list-row:last-child { border-bottom:none; }
    .list-row:hover { background:var(--surface2); }
    .row-title { font-weight:500; margin-bottom:3px; }
    .row-sub   { font-size:.75rem; color:var(--text3); }
    .row-right { display:flex; align-items:center; gap:1rem; margin-left:1rem; flex-shrink:0; }
    .row-cost  { font-size:.85rem; color:var(--text2); font-weight:500; }
    .empty     { padding:3rem; text-align:center; color:var(--text3); }
    .list-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; }

    /* Badge */
    .badge { font-size:.7rem; font-weight:500; padding:.2rem .6rem; border-radius:20px; text-transform:capitalize; }
    .badge-pending   { background:rgba(245,158,11,.12); color:var(--warning); }
    .badge-approved  { background:rgba(16,185,129,.12); color:var(--success); }
    .badge-rejected  { background:rgba(244,63,94,.12);  color:var(--danger);  }
    .badge-completed { background:rgba(167,139,250,.12);color:var(--purple);  }
    .badge-available   { background:rgba(16,185,129,.12); color:var(--success); }
    .badge-sold        { background:rgba(99,102,241,.12); color:var(--accent2); }
    .badge-transit     { background:rgba(245,158,11,.12); color:var(--warning); }
    .badge-hold        { background:rgba(167,139,250,.12);color:var(--purple);  }
    .badge-in-transit  { background:rgba(99,102,241,.12); color:var(--accent2); }
    .badge-delivered   { background:rgba(16,185,129,.12); color:var(--success); }
    .badge-cancelled   { background:rgba(244,63,94,.12);  color:var(--danger);  }

    /* Filter pills */
    .filter-row { display:flex; gap:.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
    .pill { padding:.35rem .85rem; border-radius:20px; font-size:.8rem; border:1px solid var(--border2); background:transparent; color:var(--text2); cursor:pointer; font-family:inherit; transition:all .15s; text-transform:capitalize; }
    .pill.active { border-color:var(--accent); background:rgba(99,102,241,.15); color:var(--accent2); }

    /* Detail */
    .detail-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:0 1.25rem; margin-bottom:1.5rem; }
    .detail-row  { display:flex; gap:1rem; padding:.875rem 0; border-bottom:1px solid var(--border); }
    .detail-row:last-child { border-bottom:none; }
    .detail-key  { width:160px; flex-shrink:0; font-size:.8rem; color:var(--text3); padding-top:1px; }
    .detail-val  { font-size:.875rem; line-height:1.6; }
    .detail-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.75rem; }
    .action-row { display:flex; gap:.75rem; }

    /* Vehicles */
    .vehicle-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:1rem; }
    .vehicle-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.25rem; }
    .vehicle-cat  { font-size:.65rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; }
    .vehicle-name { font-weight:600; font-size:1rem; margin-bottom:4px; }
    .vehicle-price { color:var(--accent2); font-weight:500; font-size:.9rem; margin-top:8px; }

    /* Reports */
    .report-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:2rem; }
    .chart-grid  { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .chart-card  { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.5rem; }
    .bar-row     { margin-bottom:.875rem; }
    .bar-meta    { display:flex; justify-content:space-between; margin-bottom:5px; }
    .bar-label   { font-size:.8rem; color:var(--text2); text-transform:capitalize; }
    .bar-count   { font-size:.8rem; font-weight:600; }
    .bar-track   { height:5px; background:var(--border2); border-radius:3px; overflow:hidden; }
    .bar-fill    { height:100%; border-radius:3px; transition:width .4s ease; }

    /* ── Summary Matrix ── */
    .matrix-wrap { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.75rem; }
    .matrix-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:1.1rem 1.25rem; box-shadow:0 2px 12px rgba(0,0,0,.2); }
    .matrix-title { font-size:.6rem; font-weight:800; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.75rem; }
    .matrix-rows  { display:flex; flex-direction:column; gap:5px; }
    .matrix-row   { display:flex; justify-content:space-between; align-items:center; padding:.35rem .6rem; border-radius:7px; background:var(--surface2); border:1px solid var(--border); }
    .matrix-name  { font-size:.8rem; color:var(--text2); }
    .matrix-count { font-size:.85rem; font-weight:800; color:var(--text); min-width:24px; text-align:right; }
    .matrix-bar   { height:3px; background:var(--border2); border-radius:2px; margin-top:4px; overflow:hidden; }
    .matrix-bar-fill { height:100%; border-radius:2px; }
    .cb-yes { color:var(--success); font-weight:700; }
    .cb-no  { color:var(--text3); }
    .editable-cell { cursor:cell; }
    .editable-cell:hover:not([data-editing]) { background:rgba(99,102,241,.06) !important; outline:1px solid var(--border2); }
    .editable-cell[data-editing] { background:rgba(99,102,241,.1) !important; padding:0 !important; }
    .cell-input {
      width:100%; min-width:80px; background:var(--surface2);
      border:1.5px solid var(--accent); border-radius:4px; color:var(--text);
      padding:4px 6px; font-size:.75rem; font-family:inherit; outline:none; display:block;
    }
    .saving-flash { opacity:.5; transition:opacity .2s; }

    /* ── Buying / Transport Table ── */
    .buying-wrap {
      overflow-x:auto; border:1px solid var(--border); border-radius:12px;
      background:var(--surface); box-shadow:0 4px 24px rgba(0,0,0,.35);
    }
    .buying-table { border-collapse:collapse; white-space:nowrap; font-size:.75rem; min-width:100%; }
    .buying-table th {
      position:sticky; top:0; z-index:2;
      color:var(--text3); font-size:.6rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
      padding:.65rem .85rem; border-bottom:1px solid var(--border2);
      border-right:1px solid rgba(255,255,255,.04); white-space:nowrap; text-align:left;
    }
    .buying-table td {
      padding:.55rem .85rem; border-bottom:1px solid rgba(255,255,255,.04);
      border-right:1px solid rgba(255,255,255,.04); color:var(--text2); vertical-align:middle;
      max-width:160px; overflow:hidden; text-overflow:ellipsis; transition:background .1s;
    }
    .buying-table tbody tr:nth-child(even) td { background:rgba(255,255,255,.015); }
    .buying-table tbody tr:hover td { background:rgba(99,102,241,.08) !important; }
    .buying-table tbody tr:last-child td { border-bottom:none; }
    /* sticky first + last col */
    .buying-table th:first-child,
    .buying-table td:first-child { position:sticky; left:0; z-index:1; background:var(--surface); border-right:2px solid var(--border2); }
    .buying-table th:first-child { z-index:3; }
    .buying-table th:last-child,
    .buying-table td:last-child  { position:sticky; right:0; z-index:1; background:var(--surface); border-left:2px solid var(--border2); }
    .buying-table th:last-child  { z-index:3; }
    .buying-table tbody tr:nth-child(even) td:first-child,
    .buying-table tbody tr:nth-child(even) td:last-child { background:rgba(255,255,255,.015); }
    .buying-table tbody tr:hover td:first-child,
    .buying-table tbody tr:hover td:last-child { background:rgba(99,102,241,.08) !important; }
    /* group header colours — richer */
    .th-basic    { background:#13131e !important; }
    .th-purchase { background:#0d1f1a !important; color:#6ee7b7 !important; border-top:2px solid rgba(110,231,183,.3) !important; }
    .th-market   { background:#0d1228 !important; color:#a5b4fc !important; border-top:2px solid rgba(165,180,252,.3) !important; }
    .th-expenses { background:#201510 !important; color:#fcd34d !important; border-top:2px solid rgba(252,211,77,.3)  !important; }
    .th-summary  { background:#19102a !important; color:#e9d5ff !important; border-top:2px solid rgba(233,213,255,.3) !important; }
    .th-status   { background:#0c1622 !important; color:#7dd3fc !important; border-top:2px solid rgba(125,211,252,.3) !important; }
    .buying-search {
      padding:.5rem .85rem; background:var(--surface2); border:1px solid var(--border2);
      border-radius:8px; color:var(--text); font-size:.875rem; font-family:inherit; outline:none; width:260px;
    }
    .buying-search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .col-vin   { font-weight:600; color:var(--accent2) !important; font-family:monospace; font-size:.72rem; letter-spacing:.03em; }
    .col-make  { font-weight:600; color:var(--text) !important; }
    .col-num   { text-align:right; }
    .col-money { text-align:right; color:#34d399 !important; font-weight:600; font-variant-numeric:tabular-nums; }

    /* Spinner */
    .spinner-wrap { display:flex; justify-content:center; align-items:center; padding:4rem; }
    .spinner { width:28px; height:28px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin .65s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:none; } }
    .page { animation:fadeIn .18s ease; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const API_KEY    = 'AIzaSyAgXhX22Nyi3DWHi4sveNfugKG59RMXk8s';
const PROJECT_ID = 'propurchase-e9c65';
const FS         = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`;
const AUTH_URL   = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${API_KEY}`;
const REFRESH_URL= `https://securetoken.googleapis.com/v1/token?key=${API_KEY}`;

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let S = { user: null, cache: { requests: [], vehicles: [], buying: [], transport: [] } };
function loadS()  { try { const d=localStorage.getItem('pp'); if(d) S=JSON.parse(d); if(!S.cache.buying) S.cache.buying=[]; if(!S.cache.transport) S.cache.transport=[]; } catch {} }
function saveS()  { try { localStorage.setItem('pp', JSON.stringify(S)); } catch {} }
function clearS() { S={user:null,cache:{requests:[],vehicles:[],buying:[],transport:[]}}; localStorage.removeItem('pp'); }

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
async function signIn(email, password) {
  const r = await fetch(AUTH_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email,password,returnSecureToken:true}) });
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message||'Login failed');
  S.user = { uid:d.localId, email:d.email, idToken:d.idToken, refreshToken:d.refreshToken, expiresAt:Date.now()+Number(d.expiresIn)*1000 };
  saveS();
}
async function refreshToken() {
  if (!S.user?.refreshToken) return false;
  try {
    const r = await fetch(REFRESH_URL, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:`grant_type=refresh_token&refresh_token=${S.user.refreshToken}` });
    const d = await r.json();
    if (!d.id_token) return false;
    S.user.idToken=d.id_token; S.user.refreshToken=d.refresh_token; S.user.expiresAt=Date.now()+Number(d.expires_in)*1000;
    saveS(); return true;
  } catch { return false; }
}
async function ensureToken() {
  if (!S.user) return false;
  if (Date.now() < S.user.expiresAt-60000) return true;
  return refreshToken();
}
function signOut() { clearS(); draw(); }

/* ═══════════════════════════════════════════
   FIRESTORE REST
═══════════════════════════════════════════ */
function authH() { return {'Content-Type':'application/json','Authorization':`Bearer ${S.user.idToken}`}; }
function parseVal(v) {
  if (!v) return null;
  if ('stringValue'    in v) return v.stringValue;
  if ('integerValue'   in v) return Number(v.integerValue);
  if ('doubleValue'    in v) return v.doubleValue;
  if ('booleanValue'   in v) return v.booleanValue;
  if ('timestampValue' in v) return v.timestampValue;
  if ('nullValue'      in v) return null;
  return null;
}
function parseDoc(doc) {
  if (!doc?.name) return null;
  const obj={id:doc.name.split('/').pop()};
  for (const [k,v] of Object.entries(doc.fields||{})) obj[k]=parseVal(v);
  return obj;
}
function toVal(v) {
  if (v===null||v===undefined) return {nullValue:null};
  if (typeof v==='boolean') return {booleanValue:v};
  if (typeof v==='number')  return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  return {stringValue:String(v)};
}
function toFields(obj) { const f={}; for (const [k,v] of Object.entries(obj)) f[k]=toVal(v); return {fields:f}; }
async function fsGet(col) {
  const r=await fetch(`${FS}/${col}?pageSize=500`,{headers:authH()});
  if (!r.ok) throw new Error('read failed');
  const d=await r.json();
  return (d.documents||[]).map(parseDoc).filter(Boolean);
}
async function fsAdd(col, data) {
  const r=await fetch(`${FS}/${col}`,{method:'POST',headers:authH(),body:JSON.stringify(toFields({...data,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()}))});
  if (!r.ok) throw new Error('write failed');
  return parseDoc(await r.json());
}
async function fsPatch(col, id, data) {
  const fields={}; for (const [k,v] of Object.entries({...data,updatedAt:new Date().toISOString()})) fields[k]=toVal(v);
  const mask=Object.keys(fields).map(k=>`updateMask.fieldPaths=${encodeURIComponent(k)}`).join('&');
  const r=await fetch(`${FS}/${col}/${id}?${mask}`,{method:'PATCH',headers:authH(),body:JSON.stringify({fields})});
  if (!r.ok) throw new Error('patch failed');
}
async function fsDel(col, id) { await fetch(`${FS}/${col}/${id}`,{method:'DELETE',headers:authH()}); }

/* ═══════════════════════════════════════════
   DATA REFRESH
═══════════════════════════════════════════ */
async function refreshData() {
  if (!await ensureToken()) { signOut(); return; }
  try {
    const [requests,vehicles,buying,transport] = await Promise.all([fsGet('requests'),fsGet('vehicles'),fsGet('buying'),fsGet('transport')]);
    S.cache.requests  = requests.sort((a,b)=>(b.createdAt||'')>(a.createdAt||'')?1:-1);
    S.cache.vehicles  = vehicles;
    S.cache.buying    = buying.sort((a,b)=>(b.createdAt||'')>(a.createdAt||'')?1:-1);
    S.cache.transport = transport.sort((a,b)=>(b.createdAt||'')>(a.createdAt||'')?1:-1);
    saveS(); loadPage(route());
  } catch(e) { console.warn('Refresh failed:',e.message); }
}

const route = () => location.hash.slice(1) || 'dashboard';
const go    = h  => { location.hash = h; };

/* ═══════════════════════════════════════════
   DRAW
═══════════════════════════════════════════ */
function draw() {
  const el = document.getElementById('app');
  if (!S.user) { el.innerHTML=tplLogin(); bindLogin(); return; }
  const r = route();
  el.innerHTML = tplShell(r);
  document.getElementById('signout-btn').addEventListener('click', signOut);
  loadPage(r);
  refreshData();
}
function loadPage(r) {
  const main = document.getElementById('main-content');
  if (!main) return;
  if      (r==='dashboard')               pageDashboard(main);
  else if (r==='requests/new')            pageNewRequest(main);
  else if (r.startsWith('requests/'))     pageDetail(main, r.slice(9));
  else if (r==='requests')               pageRequests(main);
  else if (r==='buying/new')             pageBuyingForm(main, null);
  else if (r.startsWith('buying/'))      pageBuyingForm(main, r.slice(7));
  else if (r==='buying')                 pageBuying(main);
  else if (r==='transportation/new')     pageTransportForm(main, null);
  else if (r.startsWith('transportation/')) pageTransportForm(main, r.slice(15));
  else if (r==='transportation')         pageTransportation(main);
  else if (r==='vehicles')               pageVehicles(main);
  else if (r==='reports')               pageReports(main);
  else                                   pageDashboard(main);
}

function matrixCard(title, data, color) {
  const entries = Object.entries(data).filter(([k])=>k).sort((a,b)=>b[1]-a[1]);
  const max = entries[0]?.[1] || 1;
  if (!entries.length) return `<div class="matrix-card"><div class="matrix-title">${title}</div><p style="font-size:.8rem;color:var(--text3);">No data yet.</p></div>`;
  return `<div class="matrix-card">
    <div class="matrix-title">${title}</div>
    <div class="matrix-rows">
      ${entries.map(([k,v])=>`
        <div class="matrix-row">
          <span class="matrix-name">${esc(k)}</span>
          <span class="matrix-count">${v}</span>
        </div>
        <div class="matrix-bar"><div class="matrix-bar-fill" style="width:${(v/max*100).toFixed(1)}%;background:${color};"></div></div>
      `).join('')}
    </div>
  </div>`;
}

function insertBlankRow(tbody, cols, dropdownOpts, onSave) {
  tbody.querySelector('.new-row')?.remove();
  const tr = document.createElement('tr');
  tr.className = 'new-row';
  tr.style.cssText = 'background:rgba(99,102,241,.06);';

  const numTd = document.createElement('td');
  numTd.style.cssText = 'color:var(--accent2);font-size:.8rem;font-weight:700;text-align:center;';
  numTd.textContent = '+';
  tr.appendChild(numTd);

  cols.forEach(col => {
    const k = col[0], l = col[1], t = col.length >= 4 ? col[3] : col[2];
    const td = document.createElement('td');
    td.style.cssText = 'padding:3px 4px;';
    const opts = dropdownOpts[k];
    let inp;
    if (t === 'checkbox') {
      inp = document.createElement('input');
      inp.type = 'checkbox';
      inp.style.cssText = 'width:15px;height:15px;accent-color:var(--accent);display:block;margin:auto;';
    } else if (t === 'select' || opts) {
      inp = document.createElement('select');
      (opts || []).forEach(o => {
        const op = document.createElement('option');
        op.value = o; op.textContent = o || '— —';
        inp.appendChild(op);
      });
    } else {
      inp = document.createElement('input');
      inp.type = t === 'number' ? 'number' : t === 'date' ? 'date' : 'text';
      inp.placeholder = l.toLowerCase();
      if (t === 'number') { inp.step = '0.01'; inp.min = '0'; }
    }
    inp.className = 'cell-input';
    inp.dataset.k = k;
    inp.dataset.t = t;
    inp.style.minWidth = '70px';
    td.appendChild(inp);
    tr.appendChild(td);
  });

  const actTd = document.createElement('td');
  actTd.style.whiteSpace = 'nowrap';
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-primary';
  saveBtn.style.cssText = 'font-size:.7rem;padding:.3rem .65rem;';
  saveBtn.textContent = 'Save';
  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-ghost';
  cancelBtn.style.cssText = 'font-size:.7rem;padding:.3rem .5rem;margin-left:4px;';
  cancelBtn.textContent = '✗';
  actTd.appendChild(saveBtn);
  actTd.appendChild(cancelBtn);
  tr.appendChild(actTd);
  tbody.appendChild(tr);
  tr.scrollIntoView({ behavior: 'smooth', block: 'center' });
  tr.querySelector('.cell-input')?.focus();
  cancelBtn.addEventListener('click', () => tr.remove());
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true; saveBtn.textContent = '…';
    if (!await ensureToken()) { saveBtn.disabled = false; saveBtn.textContent = 'Save'; return; }
    const data = {};
    tr.querySelectorAll('[data-k]').forEach(inp => {
      data[inp.dataset.k] = inp.dataset.t === 'checkbox' ? String(inp.checked) : inp.value;
    });
    try { await onSave(data); }
    catch { saveBtn.disabled = false; saveBtn.textContent = 'Save'; }
  });
}

function setCellContent(td, car, key, type) {
  delete td.dataset.editing;
  const v = car[key];
  if (type === 'checkbox') {
    td.innerHTML = (v === 'true' || v === true) ? '<span class="cb-yes">✓</span>' : '<span class="cb-no">—</span>';
  } else if (key === 'status') {
    td.innerHTML = v ? badge(v) : '';
  } else if (MONEY_KEYS.has(key)) {
    td.textContent = v ? fmt$(v) : '';
  } else {
    td.textContent = v ?? '';
  }
}

async function editCell(td, car, key, type, opts, col='buying') {
  if (td.dataset.editing) return;
  td.dataset.editing = '1';
  const orig = car[key];

  if (type === 'checkbox') {
    const newVal = String(!(orig === 'true' || orig === true));
    car[key] = newVal;
    setCellContent(td, car, key, type);
    td.classList.add('saving-flash');
    try { if (!await ensureToken()) throw 0; await fsPatch(col, car.id, {[key]: newVal}); saveS(); }
    catch { car[key] = orig; setCellContent(td, car, key, type); }
    setTimeout(() => td.classList.remove('saving-flash'), 400);
    return;
  }

  let inp;
  if (type === 'select' || opts) {
    inp = document.createElement('select');
    (opts || []).forEach(o => {
      const op = document.createElement('option');
      op.value = o; op.textContent = o || '— Select —';
      if (o === (orig ?? '')) op.selected = true;
      inp.appendChild(op);
    });
  } else {
    inp = document.createElement('input');
    inp.type = type === 'number' ? 'number' : type === 'date' ? 'date' : 'text';
    inp.value = orig ?? '';
    if (type === 'number') { inp.step = '0.01'; inp.min = '0'; }
  }
  inp.className = 'cell-input';
  td.innerHTML = '';
  td.appendChild(inp);
  inp.focus();
  if (inp.tagName === 'INPUT' && inp.type !== 'date') inp.select();

  let saved = false;
  const save = async () => {
    if (saved) return; saved = true;
    const newVal = inp.value;
    car[key] = newVal;
    setCellContent(td, car, key, type);
    if (String(newVal) !== String(orig ?? '')) {
      td.classList.add('saving-flash');
      try {
        if (!await ensureToken()) throw 0;
        await fsPatch(col, car.id, {[key]: type === 'number' && newVal !== '' ? Number(newVal) : newVal});
        saveS();
      } catch { car[key] = orig; setCellContent(td, car, key, type); }
      setTimeout(() => td.classList.remove('saving-flash'), 400);
    }
  };

  inp.addEventListener('blur', save);
  if (type === 'select' || opts) inp.addEventListener('change', save);
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); save(); }
    if (e.key === 'Escape') { saved = true; car[key] = orig; setCellContent(td, car, key, type); }
  });
}

function pageBuyingForm(el, id) {
  const car = id ? S.cache.buying.find(c=>c.id===id) : null;
  const val = k => car ? esc(car[k]??'') : '';
  const isEdit = !!car;

  const sections = [
    { title:'Vehicle Information', keys:['date','floorPlan','source','buyer','vin','year','make','model','odometer','color','description'], cols:2 },
    { title:'Purchase Details',    keys:['purchasedDate','buyingPrice','buyFee','otherBuyingExpenses','totalPurchase'], cols:2 },
    { title:'Market Values',       keys:['carfaxValue','mCarfaxValue','cargurusValue','mCargurusValue'], cols:2 },
    { title:'Expenses',            keys:['transport','ownTransport','auctionFee','bodyMasraf','digerMasraf','bodyBeklenenMasraf','digerBeklenenMasraf'], cols:2 },
    { title:'Summary',             keys:['totalBuyingPrice','totalAll','carfax','cargurus','rate','price'], cols:3 },
    { title:'Status & Notes',      keys:['inventory','status','floors','comment','transportation','arbitration'], cols:2 },
  ];

  const colMap = Object.fromEntries(BUYING_COLS.map(c=>c));
  const typeMap= Object.fromEntries(BUYING_COLS.map(([k,l,g,t])=>[k,t]));
  const labelMap=Object.fromEntries(BUYING_COLS.map(([k,l])=>[k,l]));

  const fieldHTML = (k) => {
    const t   = typeMap[k] || 'text';
    const lbl = labelMap[k] || k;
    const v   = val(k);
    const opts = DROPDOWN_OPTS[k];
    if (opts || t === 'select') {
      const list = opts || STATUS_OPTS.map(o=>o);
      return `<div class="field"><label class="field-label">${lbl}</label>
        <select id="f-${k}">
          ${list.map(o=>o===''?`<option value="">— Select —</option>`:`<option value="${esc(o)}"${v===o?' selected':''}>${esc(o)}</option>`).join('')}
        </select></div>`;
    }
    if (t === 'checkbox') {
      const checked = v === 'true' || v === true;
      return `<div class="field"><label class="field-label">${lbl}</label>
        <div style="display:flex;align-items:center;gap:.6rem;padding:.65rem .75rem;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;cursor:pointer;" onclick="this.querySelector('input').click()">
          <input type="checkbox" id="f-${k}" ${checked?'checked':''} style="width:16px;height:16px;cursor:pointer;accent-color:var(--accent);" onclick="event.stopPropagation()" />
          <span style="font-size:.875rem;color:var(--text2);">Yes</span>
        </div></div>`;
    }
    if (t === 'date') {
      return `<div class="field"><label class="field-label">${lbl}</label><input type="date" id="f-${k}" value="${v}" /></div>`;
    }
    if (t === 'number') {
      return `<div class="field"><label class="field-label">${lbl}</label><input type="number" id="f-${k}" value="${v}" step="0.01" min="0" /></div>`;
    }
    return `<div class="field"><label class="field-label">${lbl}</label><input type="text" id="f-${k}" value="${v}" /></div>`;
  };

  el.innerHTML=`
    <button class="btn-back" id="back-btn">← Back to Buying</button>
    <div class="page-header">
      <h1>${isEdit ? `Edit: ${esc(car.year||'')} ${esc(car.make||'')} ${esc(car.model||'')}` : 'Add Car to Buying'}</h1>
      <p class="subtitle">${isEdit ? `VIN: ${esc(car.vin||'—')}` : 'Fill in the vehicle details'}</p>
    </div>
    <div id="form-error" class="error-box hidden" style="max-width:900px;margin-bottom:1rem;"></div>
    <form id="buying-form" style="max-width:900px;display:flex;flex-direction:column;gap:1.5rem;">
      ${sections.map(sec=>`
        <div class="form-card">
          <div class="form-section-title">${sec.title}</div>
          <div class="form-grid${sec.cols===3?'-3':sec.cols===4?'-4':''}">
            ${sec.keys.map(k=>fieldHTML(k)).join('')}
          </div>
        </div>`).join('')}
      <div class="form-actions" style="max-width:900px;">
        <button type="button" class="btn-ghost" id="cancel-btn">Cancel</button>
        <button type="submit" class="btn-primary" id="submit-btn">${isEdit?'Save Changes':'Add Car'}</button>
      </div>
    </form>`;

  $('back-btn').addEventListener('click',()=>history.back());
  $('cancel-btn').addEventListener('click',()=>go('buying'));
  $('buying-form').addEventListener('submit', async e=>{
    e.preventDefault();
    const btn=$('submit-btn'),err=$('form-error');
    btn.textContent=isEdit?'Saving…':'Adding…'; btn.disabled=true; err.classList.add('hidden');
    try {
      if (!await ensureToken()) throw new Error('Session expired');
      const data={};
      BUYING_COLS.forEach(([k,l,g,t])=>{
        const el2=$(`f-${k}`);
        if (!el2) return;
        data[k] = t==='checkbox' ? String(el2.checked) : el2.value;
      });
      if (isEdit) {
        await fsPatch('buying',id,data);
        const idx=S.cache.buying.findIndex(c=>c.id===id);
        if (idx>-1) S.cache.buying[idx]={...S.cache.buying[idx],...data};
      } else {
        const doc=await fsAdd('buying',data);
        S.cache.buying.unshift(doc);
      }
      saveS(); go('buying');
    } catch(ex) { err.textContent=ex.message||'Failed to save.'; err.classList.remove('hidden'); btn.textContent=isEdit?'Save Changes':'Add Car'; btn.disabled=false; }
  });
}

        vehicles.map(v=>{const c=CAT_COLOR[(v.category||'').toLowerCase()]||'#64748b';return`
          <div class="vehicle-card" style="border-top:2px solid ${c};">
            <div class="vehicle-cat" style="color:${c};">${esc(v.category||'Vehicle')}</div>
            <div class="vehicle-name">${esc(v.year)} ${esc(v.make)} ${esc(v.model)}</div>
            ${v.basePrice?`<div class="vehicle-price">${fmt$(v.basePrice)}</div>`:''}
            <button class="btn-remove" data-del="${v.id}">Remove</button>
          </div>`;}).join('')}
    </div>`;
  const wrap=$('add-wrap'),tog=$('toggle-btn');
  tog.addEventListener('click',()=>{const h=wrap.classList.toggle('hidden');tog.textContent=h?'+ Add Vehicle':'Cancel';});
  $('cancel-v-btn').addEventListener('click',()=>{wrap.classList.add('hidden');tog.textContent='+ Add Vehicle';});
  $('v-form').addEventListener('submit',async e=>{
    e.preventDefault(); const btn=$('add-v-btn'); btn.textContent='Adding…'; btn.disabled=true;
    try { if(!await ensureToken()) throw new Error(); const doc=await fsAdd('vehicles',{make:$('v-make').value,model:$('v-model').value,year:$('v-year').value,category:$('v-cat').value,basePrice:$('v-price').value}); S.cache.vehicles.push(doc); saveS(); pageVehicles(el); }
    catch { btn.textContent='Add Vehicle'; btn.disabled=false; }
  });
  el.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{
    if (!await ensureToken()) return;
    await fsDel('vehicles',b.dataset.del); S.cache.vehicles=S.cache.vehicles.filter(v=>v.id!==b.dataset.del); saveS(); pageVehicles(el);
  }));
}

/* ═══════════════════════════════════════════
   REPORTS
═══════════════════════════════════════════ */
function pageReports(el) {
  const all=S.cache.requests, buying=S.cache.buying;
  const total=all.length, total$=all.reduce((s,r)=>s+(Number(r.estimatedCost)||0),0);
  const approved=all.filter(r=>r.status==='approved'||r.status==='completed').length;
  const rate=total>0?Math.round(approved/total*100):0;
  const byS=all.reduce((a,r)=>{a[r.status]=(a[r.status]||0)+1;return a;},{});
  const byP=all.reduce((a,r)=>{a[r.priority]=(a[r.priority]||0)+1;return a;},{});
  const bySt=buying.reduce((a,c)=>{a[c.status||'Unknown']=(a[c.status||'Unknown']||0)+1;return a;},{});
  const maxS=Math.max(...Object.values(byS),1), maxP=Math.max(...Object.values(byP),1), maxBSt=Math.max(...Object.values(bySt),1);
  const SC={pending:'var(--warning)',approved:'var(--success)',rejected:'var(--danger)',completed:'var(--purple)'};
  const bars=(obj,max,cf)=>Object.entries(obj).map(([k,v])=>`
    <div class="bar-row"><div class="bar-meta"><span class="bar-label">${esc(k)}</span><span class="bar-count">${v}</span></div>
    <div class="bar-track"><div class="bar-fill" style="width:${(v/max*100).toFixed(1)}%;background:${cf(k)};"></div></div></div>`).join('')||`<p style="color:var(--text3);font-size:.8rem;">No data.</p>`;
  el.innerHTML=`
    <div class="page-header"><h1>Reports</h1><p class="subtitle">Summary of purchasing activity</p></div>
    <div class="report-grid">
      <div class="stat-card c-accent"> <div class="stat-label">Total Requests</div>    <div class="stat-value">${total}</div></div>
      <div class="stat-card c-success"><div class="stat-label">Total Est. Budget</div> <div class="stat-value" style="font-size:1.3rem;">${total$?fmt$(total$):'—'}</div></div>
      <div class="stat-card c-purple"> <div class="stat-label">Approval Rate</div>     <div class="stat-value">${rate}%</div></div>
    </div>
    <div class="chart-grid" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:0;">
      <div class="chart-card"><h3 style="margin-bottom:1.25rem;">Requests by Status</h3>  ${bars(byS,maxS,k=>SC[k]||'var(--accent)')}</div>
      <div class="chart-card"><h3 style="margin-bottom:1.25rem;">Requests by Priority</h3>${bars(byP,maxP,()=>'var(--accent)')}</div>
      <div class="chart-card"><h3 style="margin-bottom:1.25rem;">Buying by Status</h3>    ${bars(bySt,maxBSt,()=>'var(--success)')}</div>
    </div>`;
}

/* ═══════════════════════════════════════════
   SHARED
═══════════════════════════════════════════ */
function bindRows(container) {
  container.querySelectorAll('[data-go]').forEach(r=>r.addEventListener('click',()=>go(r.dataset.go)));
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
loadS();
draw();
</script>
